<body>
  <header class="header">
    <nav class="main-nav">
      <div class="container main-nav__container">
        <a href="#" class="main-nav__burger">
          <img src="/assets/burger-mob.svg" alt="кнопка навигации" />
        </a>
        <a href="#" class="main-nav__logo">
          <img src="/assets/logo.svg" alt="логотип" />
        </a>
        <ul class="main-nav__list clear-list">
          <li class="main-nav__item">
            <a routerLink="/" *ngIf="isShowCatalog">{{ headertItem1 }}</a>
          </li>
          <li class="main-nav__item">
            <a href="#">{{ aboutCompany }}</a>
          </li>
          <li class="main-nav__item">
            <a href="#">Каталог</a>
          </li>
          <li class="main-nav__item">
            <button textTransform class="btn" (click)="changeMenuText()">text/up/low</button>
          </li>
          <li class="main-nav__item">
            <button textTransform class="btn" routerLink="/user">Пользователи</button>
          </li>
          <li class="main-nav__item">
            <button textTransform class="btn" routerLink="/todos/">Задачи</button>
          </li>
        </ul>
        <ul class="main-nav__content nav-content clear-list">
          <li class="nav-content__item">
            <a href="tel:+79650842929" class="nav-content__phone">
              <img src="/assets/Phone.svg" alt="телефон" />
              <span>+79650842929</span>
            </a>
          </li>
          <li class="nav-content__item heart">
            <img src="/assets/heart.svg" alt="сердечко" />
          </li>
          <li class="nav-content__item">
            <button yellow class="nav-content__cart" aria-label="карзина">
              <img src="/assets/cart.svg" alt="карзина" />
              <span>Пусто</span>
            </button>
          </li>
        </ul>
        <img src="/assets/cart.svg" alt="карзина" class="cart-img" />
      </div>
    </nav>
    <div class="header-sub">
      <div class="container header-sub__container">
        <button class="header-sub__btn-menu" aria-label="кнопка меню">
          <img src="/assets/icon-nav-bottom.svg" alt="кнопка меню" />
        </button>
        <ul class="header-sub__list clear-list">
          <li class="header-sub__item">
            <a
              href="#"
              class="header-sub__item-link ngfor-link"
              *ngFor="let item of menuItems"
              >{{ item }}</a
            >
          </li>
        </ul>
        <div class="header-sub__utils">
          <div class="header-sub__input-box">
            <input
              type="search"
              name="search"
              placeholder="Поиск, например Круг зачистной "
              class="header-sub__search-input"
            />
            <button class="header-sub__search-btn" aria-label="Найти">
              <img src="/assets/icon-search.svg" alt="лупа" />
            </button>
          </div>
          <div class="header-sub__location">
            <img
              src="/assets/map-pin.svg"
              alt="значок локации"
              class="header-sub__location-img"
            />
            <Select class="header-sub__сities">
              <option value="moscow">Москва</option>
              <option value="omsk">Омск</option>
            </Select>
          </div>
        </div>
      </div>
    </div>
  </header>
  <router-outlet></router-outlet>
</body>
