<p class="todo-title">ТЕКСТ ЗАДАЧИ:</p>
<p class="todo-title">{{ todo.title }}</p>
<p class="todo-title">АВТОР ЗАДАЧИ:</p>
<p class="todo-title">{{ todo.userId }}</p>
<p class="todo-title">ЗАДАЧА ЗАВЕРШЕНА:</p>
<p class="todo-title">{{ todo.completed ? 'ДА' : 'НЕТ' }}</p>
<button class="todo-btn" (click)="onDeleteTodo(todo.id)">Удалить задачу</button>
