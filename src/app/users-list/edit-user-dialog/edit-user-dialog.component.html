<form class="form-user" [formGroup]="form">
    <mat-form-field>
      <mat-label>NAME:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="text"
        formControlName="name"
      />
    </mat-form-field>
    <mat-form-field formGroupName="address">
      <mat-label>CITY:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="text"
        formControlName="city"
      />
    </mat-form-field>
    <mat-form-field formGroupName="company">
      <mat-label>COMPANY NAME:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="text"
        formControlName="name"
      />
    </mat-form-field>
    <mat-form-field>
      <mat-label>EMAIL:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="email"
        formControlName="email"
      />
    </mat-form-field>
    <mat-form-field>
      <mat-label>WEBSITE:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="text"
        formControlName="website"
      />
    </mat-form-field>
    <mat-form-field>
      <mat-label>PHONE:</mat-label>
      <input
        matInput
        class="form-user__input"
        type="text"
        formControlName="phone"
      />
    </mat-form-field>
    <button
      matFab
      extended
      class="form-user-btn"
      [mat-dialog-close]="form.value"
    >
      <mat-icon>edit</mat-icon>
      РЕДАКТИРОВАТЬ
    </button>
  </form>
